upstream scanner_backend {
    server app:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name fiwpr.id.vn;

    ssl_certificate /etc/letsencrypt/live/fiwpr.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fiwpr.id.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Auth endpoints - stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Actuator health (internal only ideally)
    location /actuator/health {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api-docs/ {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
