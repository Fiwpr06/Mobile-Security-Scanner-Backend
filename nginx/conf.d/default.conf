upstream scanner_backend {
    server app:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name fiwpr.id.vn;
    
    # We remove the 80->443 redirect and SSL configs because 
    # Cloudflare Flexible mode connects to Nginx via HTTP (port 80).

    # Auth endpoints - stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Actuator health (internal only ideally)
    location /actuator/health {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Swagger UI
    location /swagger-ui {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api-docs {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Default location - Proxy everything else to Spring Boot
    location / {
        proxy_pass http://scanner_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
