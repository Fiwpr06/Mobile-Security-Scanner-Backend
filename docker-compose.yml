version: '3.9'

# =============================================
# SafeSurf - Docker Compose
# Local development environment
# =============================================

services:
  # -----------------------------------------------
  # Application
  # -----------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: security-scanner-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-security_scanner}
      DB_USERNAME: ${DB_USERNAME:-scanner_user}
      DB_PASSWORD: ${DB_PASSWORD:-scanner_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-safesurf_redis_secret}
      JWT_SECRET: ${JWT_SECRET:-safesurf-local-dev-secret-key-must-be-256-bits-long}
      GOOGLE_SAFE_BROWSING_API_KEY: ${GOOGLE_SAFE_BROWSING_API_KEY:-}
      VIRUS_TOTAL_API_KEY: ${VIRUS_TOTAL_API_KEY:-}
      ABUSE_IPDB_API_KEY: ${ABUSE_IPDB_API_KEY:-}
      THREAT_INTELLIGENCE_DATA_DIR: /tmp/data
      THREAT_INTELLIGENCE_EXPORT_DIR: /tmp/data/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanner-network
    volumes:
      - app-logs:/app/logs
      - ./data:/tmp/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------
  # Nginx Reverse Proxy
  # -----------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: security-scanner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - scanner-network

  # -----------------------------------------------
  # PostgreSQL Database
  # -----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: security-scanner-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-security_scanner}
      POSTGRES_USER: ${DB_USERNAME:-scanner_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scanner_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - scanner-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-scanner_user} -d ${DB_NAME:-security_scanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Redis Cache
  # -----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: security-scanner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-safesurf_redis_secret}
    volumes:
      - redis-data:/data
    networks:
      - scanner-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Prometheus (Monitoring)
  # -----------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: security-scanner-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - scanner-network

  # -----------------------------------------------
  # Grafana (Dashboards)
  # -----------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: security-scanner-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - scanner-network

# -----------------------------------------------
# Volumes
# -----------------------------------------------
volumes:
  postgres-data:
  redis-data:
  app-logs:
  nginx-logs:
  prometheus-data:
  grafana-data:

# -----------------------------------------------
# Networks
# -----------------------------------------------
networks:
  scanner-network:
    driver: bridge
    name: scanner-network
