# =============================================
# APPLICATION
# =============================================
spring.application.name=safesurf
server.port=8080
server.servlet.context-path=/
server.forward-headers-strategy=framework

# =============================================
# DATABASE - PostgreSQL
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/security_scanner}
spring.datasource.username=${DB_USERNAME:scanner_user}
spring.datasource.password=${DB_PASSWORD:scanner_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =============================================
# REDIS
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

# =============================================
# JWT
# =============================================
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:86400000}

# =============================================
# THIRD-PARTY API KEYS
# =============================================
app.third-party.google-safe-browsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY:}
app.third-party.google-safe-browsing.base-url=https://safebrowsing.googleapis.com
app.third-party.google-safe-browsing.timeout-ms=5000
app.third-party.google-safe-browsing.enabled=${GOOGLE_SAFE_BROWSING_ENABLED:true}

app.third-party.virus-total.api-key=${VIRUS_TOTAL_API_KEY:}
app.third-party.virus-total.base-url=https://www.virustotal.com
app.third-party.virus-total.timeout-ms=10000
app.third-party.virus-total.enabled=${VIRUS_TOTAL_ENABLED:true}

app.third-party.abuse-ipdb.api-key=${ABUSE_IPDB_API_KEY:}
app.third-party.abuse-ipdb.base-url=https://api.abuseipdb.com
app.third-party.abuse-ipdb.timeout-ms=5000
app.third-party.abuse-ipdb.enabled=${ABUSE_IPDB_ENABLED:true}

# =============================================
# SCAN ENGINE CONFIG
# =============================================
app.scan.weight.google-safe-browsing=${SCAN_WEIGHT_GOOGLE:0.5}
app.scan.weight.virus-total=${SCAN_WEIGHT_VIRUSTOTAL:0.3}
app.scan.weight.abuse-ipdb=${SCAN_WEIGHT_ABUSEIPDB:0.2}
app.scan.threshold.safe=${SCAN_THRESHOLD_SAFE:30}
app.scan.threshold.suspicious=${SCAN_THRESHOLD_SUSPICIOUS:60}
app.scan.parallel-enabled=true
app.scan.fast-fail-on-dangerous=true

# =============================================
# RATE LIMITING
# =============================================
app.rate-limit.per-device.requests=${RATE_LIMIT_DEVICE_REQUESTS:100}
app.rate-limit.per-device.duration-minutes=${RATE_LIMIT_DEVICE_DURATION:60}
app.rate-limit.per-ip.requests=${RATE_LIMIT_IP_REQUESTS:200}
app.rate-limit.per-ip.duration-minutes=${RATE_LIMIT_IP_DURATION:60}

# =============================================
# RESILIENCE4J - Circuit Breaker
# =============================================
resilience4j.circuitbreaker.instances.googleSafeBrowsing.sliding-window-size=10
resilience4j.circuitbreaker.instances.googleSafeBrowsing.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.googleSafeBrowsing.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.googleSafeBrowsing.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.virusTotal.sliding-window-size=10
resilience4j.circuitbreaker.instances.virusTotal.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.virusTotal.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.virusTotal.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.abuseIpDb.sliding-window-size=10
resilience4j.circuitbreaker.instances.abuseIpDb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.abuseIpDb.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.abuseIpDb.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.googleSafeBrowsing.max-attempts=3
resilience4j.retry.instances.googleSafeBrowsing.wait-duration=1s
resilience4j.retry.instances.googleSafeBrowsing.exponential-backoff-multiplier=2

resilience4j.retry.instances.virusTotal.max-attempts=3
resilience4j.retry.instances.virusTotal.wait-duration=2s
resilience4j.retry.instances.virusTotal.exponential-backoff-multiplier=2

resilience4j.retry.instances.abuseIpDb.max-attempts=3
resilience4j.retry.instances.abuseIpDb.wait-duration=1s
resilience4j.retry.instances.abuseIpDb.exponential-backoff-multiplier=2

# =============================================
# ACTUATOR / MONITORING
# =============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.tracing.sampling.probability=1.0

# =============================================
# CACHE
# =============================================
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
app.cache.scan-result-ttl-seconds=300

# =============================================
# LOGGING
# =============================================
logging.level.root=INFO
logging.level.com.security.scanner=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=SafeSurf API
springdoc.info.version=1.0.0
springdoc.info.description=Backend API for SafeSurf Application

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,null}
