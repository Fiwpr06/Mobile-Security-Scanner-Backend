spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Disable Redis for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration

app.jwt.secret=test-secret-key-for-testing-purposes-must-be-at-least-32-chars!
app.jwt.access-token-expiration=3600000

app.third-party.google-safe-browsing.api-key=test-key
app.third-party.google-safe-browsing.enabled=false
app.third-party.virus-total.api-key=test-key
app.third-party.virus-total.enabled=false
app.third-party.abuse-ipdb.api-key=test-key
app.third-party.abuse-ipdb.enabled=false

# App config required by ConfigService / SecurityConfig
app.minimum-app-version=1.0.0
app.maintenance=false
app.maintenance-message=

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Scan config
app.scan.weight.google-safe-browsing=0.5
app.scan.weight.virus-total=0.3
app.scan.weight.abuse-ipdb=0.2
app.scan.threshold.safe=30
app.scan.threshold.suspicious=60
app.scan.parallel-enabled=true
app.scan.fast-fail-on-dangerous=true

# Rate limiting
app.rate-limit.per-device.requests=100
app.rate-limit.per-device.duration-minutes=60
app.rate-limit.per-ip.requests=200
app.rate-limit.per-ip.duration-minutes=60
